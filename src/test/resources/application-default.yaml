spring:
  r2dbc:
    url:
    username:
    password:
  flyway:
    url:
    user:
    password:
  web:
    error:
      include-message: ALWAYS
      include-stacktrace: ALWAYS

atto:
  test:
    web-client-wiretap:
      enabled: false
  network:
    loopback-blocked: false
  transaction:
    prioritization:
      frequency: 1
  vote:
    weight:
      # The default profile uses a synthetic local topology where the bootstrap
      # discovery path can have one distinct final voter worth 9e18. Keep the
      # threshold at that weight so the test can reach consensus without
      # weakening production's 10e18 confirmation requirement.
      minimal-confirmation-weight: 9_000_000_000_000_000_000
    prioritization:
      frequency: 1_000
  node:
    force-voter: true
    force-historical: true
    network: LOCAL
    public-uri: ws://localhost:${websocket.port}

management:
  endpoints:
    web:
      exposure:
        include: '*'
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    cash.atto: INFO
    cash.atto.node.network: INFO
    cash.atto.node.bootstrap: INFO
    cash.atto.node.EventPublisher: INFO
    io.r2dbc.h2: INFO
    org.springframework.boot.autoconfigure: INFO
